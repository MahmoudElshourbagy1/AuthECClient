<div class="form-header text-center mb-4">
    <h2 class="fw-bold gradient-text">Sign In</h2>
    <div class="text-muted small">
        Don't have an account? 
        <a routerLink="/signup" class="login-link fw-bold">Sign up</a>
    </div>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="modern-form">
    
    <div class="mb-3">
        <div class="input-group-custom" [class.is-invalid-field]="hasError('email')">
            <span class="input-icon"><i class="bi bi-envelope"></i></span>
            <input
                type="email"
                class="form-control-modern"
                formControlName="email"
                placeholder="Email Address"
            />
        </div>
        <div class="error-feedback" *ngIf="hasError('email')">
            <span *ngIf="form.get('email')?.hasError('required')">Email is required.</span>
            <span *ngIf="form.get('email')?.hasError('email')">Enter a valid email.</span>
        </div>
    </div>


    <div class="mb-3">
        <div class="input-group-custom" [class.is-invalid-field]="hasError('password')">
            <span class="input-icon"><i class="bi bi-lock"></i></span>
            <input
                type="password"
                class="form-control-modern"
                formControlName="password"
                placeholder="Password"
            />
        </div>
        <div class="error-feedback" *ngIf="hasError('password')">
            <span *ngIf="form.get('password')?.hasError('required')">Password is required.</span>
        </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4 px-1">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
        </div>
        <a href="#" class="small login-link fw-bold">Forgot Password?</a>
    </div>

    <div class="mt-2">
        <button class="btn-modern-submit" type="submit">
            <span>Sign In</span>
            <i class="bi bi-box-arrow-in-right ms-2"></i>
        </button>
    </div>
</form>
